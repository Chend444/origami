<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevator Exercise</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="app__title">Elevator Exercise</h1>

      <section class="layout" aria-label="Elevator simulation">
        <!-- Floor labels (static) -->
        <div class="layout__labels" aria-hidden="true">
          <div class="floor-label" data-floor="9">9th</div>
          <div class="floor-label" data-floor="8">8th</div>
          <div class="floor-label" data-floor="7">7th</div>
          <div class="floor-label" data-floor="6">6th</div>
          <div class="floor-label" data-floor="5">5th</div>
          <div class="floor-label" data-floor="4">4th</div>
          <div class="floor-label" data-floor="3">3rd</div>
          <div class="floor-label" data-floor="2">2nd</div>
          <div class="floor-label" data-floor="1">1st</div>
          <div class="floor-label" data-floor="0">Ground Floor</div>
        </div>

        <!-- Elevator area (JS moves `.elevator` cabins via absolute positioning) -->
        <div class="building" id="building" aria-hidden="true">
          <div class="building__grid"></div>
          <div class="building__elevators">
            <div class="elevator elevator--idle" data-elevator-id="0">
              <span class="elevator__indicator" aria-hidden="true">●</span>
              <span class="elevator__serviceLabel" aria-hidden="true">Service</span>
            </div>
            <div class="elevator elevator--idle" data-elevator-id="1">
              <span class="elevator__indicator" aria-hidden="true">●</span>
              <span class="elevator__serviceLabel" aria-hidden="true">Service</span>
            </div>
            <div class="elevator elevator--idle" data-elevator-id="2">
              <span class="elevator__indicator" aria-hidden="true">●</span>
              <span class="elevator__serviceLabel" aria-hidden="true">Service</span>
            </div>
            <div class="elevator elevator--idle" data-elevator-id="3">
              <span class="elevator__indicator" aria-hidden="true">●</span>
              <span class="elevator__serviceLabel" aria-hidden="true">Service</span>
            </div>
            <div class="elevator elevator--idle" data-elevator-id="4">
              <span class="elevator__indicator" aria-hidden="true">●</span>
              <span class="elevator__serviceLabel" aria-hidden="true">Service</span>
            </div>
          </div>
        </div>

        <!-- Call buttons: JS toggles states + shows arrival time -->
        <div class="layout__buttons" aria-label="Call elevators">
          <div class="floor-control"><button class="call-button" data-floor="9" type="button">Call</button><span class="call-button__time" data-floor-time="9"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="8" type="button">Call</button><span class="call-button__time" data-floor-time="8"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="7" type="button">Call</button><span class="call-button__time" data-floor-time="7"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="6" type="button">Call</button><span class="call-button__time" data-floor-time="6"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="5" type="button">Call</button><span class="call-button__time" data-floor-time="5"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="4" type="button">Call</button><span class="call-button__time" data-floor-time="4"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="3" type="button">Call</button><span class="call-button__time" data-floor-time="3"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="2" type="button">Call</button><span class="call-button__time" data-floor-time="2"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="1" type="button">Call</button><span class="call-button__time" data-floor-time="1"></span></div>
          <div class="floor-control"><button class="call-button" data-floor="0" type="button">Call</button><span class="call-button__time" data-floor-time="0"></span></div>
          <div class="controls">
            <div class="emergency">
              <button class="emergency-button" id="emergencyButton" type="button">Emergency</button>
              <span class="emergency__timer" id="emergencyTimer" aria-live="polite"></span>
            </div>
            <button class="clear-button" id="clearQueueButton" type="button">Clear queue</button>
            <button class="reset-button" id="resetElevatorsButton" type="button">Send all to Ground</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
